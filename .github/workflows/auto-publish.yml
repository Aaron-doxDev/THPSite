# Auto-publish site changes
#
# OWNER: Aaron / doxDev. This file is in the site-self-service "do not touch"
# list — Debra's editing skill will never modify it.
#
# WHAT IT DOES
#   The site-self-service skill (in truehavenpress-marketplace) lets Debra edit
#   the site by talking to Claude Code. When she "publishes", the skill opens a
#   pull request from a `session/...` branch into `main`. This workflow turns
#   that PR into a live change automatically:
#     1. Guardrail — if the PR touches a protected file (the CNAME/domain config
#        or these workflows), it is NOT auto-merged; it's flagged for Aaron.
#        These are operational-safety fences, not ownership — the site is THP's.
#     2. Sanity — changed HTML files must be non-empty and not truncated.
#     3. Publish — if both pass, squash-merge to main. GitHub Pages (classic,
#        "deploy from branch") then rebuilds truehavenpress.com within a minute
#        or two. No deploy step is needed here.
#
#   Only `session/*` branches are auto-handled. Aaron's own PRs are left alone.
#
# PROMOTION NOTE
#   This is bespoke for THP (first site-self-service client). Per the doxdev-core
#   promotion rule, generalize this into a reusable workflow in doxdev-core only
#   when a SECOND site client needs it.

name: Auto-publish site changes

on:
  pull_request:
    types: [opened, reopened, synchronize]
    branches: [main]

concurrency:
  group: auto-publish-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: write
  pull-requests: write

jobs:
  validate-and-publish:
    runs-on: ubuntu-latest
    # Only the skill's own change branches are auto-published.
    if: startsWith(github.event.pull_request.head.ref, 'session/')
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      PR: ${{ github.event.pull_request.number }}
    steps:
      - name: Check out the proposed changes
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: List changed files
        run: |
          gh pr view "$PR" --repo "$GITHUB_REPOSITORY" --json files \
            --jq '.files[].path' > changed.txt
          echo "Changed files in this change set:"
          cat changed.txt

      - name: Guardrail — protected files must not be auto-published
        id: guardrail
        run: |
          # Canonical list mirrors `doNotTouch` in truehavenpress-marketplace/client.config.json.
          # Keep the two in sync if either changes. Legal pages are intentionally
          # NOT here — they're ordinary content the owner edits freely.
          protected='^(CNAME$|\.github/workflows/)'
          if grep -E "$protected" changed.txt; then
            echo "blocked=true" >> "$GITHUB_OUTPUT"
          else
            echo "blocked=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Flag protected change for Aaron and stop
        if: steps.guardrail.outputs.blocked == 'true'
        run: |
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body \
            "🚧 This change touches a protected file (the domain config or the site automation). It will **not** auto-publish — Aaron needs to review it. Nothing is lost: your edit is safely saved and waiting."
          echo "::error::Protected file modified — refusing to auto-publish."
          exit 1

      - name: HTML sanity check
        run: |
          fail=0
          while IFS= read -r f; do
            case "$f" in
              *.html)
                # Skip files deleted in this PR (not present in the checkout).
                [ -e "$f" ] || continue
                if [ ! -s "$f" ]; then
                  echo "::error file=$f::HTML file is empty."
                  fail=1
                  continue
                fi
                if grep -qi '<html' "$f" && ! grep -qi '</html>' "$f"; then
                  echo "::error file=$f::'<html>' opened but '</html>' missing — file may be truncated."
                  fail=1
                fi
                ;;
            esac
          done < changed.txt
          if [ "$fail" -ne 0 ]; then
            gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body \
              "⚠️ Something looks off with one of the edited pages, so I held off on publishing. Aaron can take a look — your changes are saved."
          fi
          exit $fail

      - name: Publish (squash-merge to main)
        run: |
          gh pr merge "$PR" --repo "$GITHUB_REPOSITORY" --squash --delete-branch
          gh pr comment "$PR" --repo "$GITHUB_REPOSITORY" --body \
            "✅ Published. The live site refreshes in a minute or two — give truehavenpress.com a refresh shortly."
